# FlareSolverr — Cloudflare challenge solver (stealth Chromium proxy).
# Scrapy POSTs to http://flaresolverr:8191/v1 (or host 127.0.0.1:8191) to fetch
# CF-protected URLs and get back HTML + cookies (cf_clearance) + the matching UA.
# Usage: see tools/docker/README.md
services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Paris
    ports:
      - "127.0.0.1:8191:8191"
