<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&amp;family=Barlow+Condensed:wght@700;900&amp;display=swap');
    </style>
    <filter id="sharpShadow">
      <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#000000" flood-opacity="1"/>
    </filter>
    <clipPath id="clip-bg">
      <rect width="520" height="160" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background — blanc journal -->
  <rect width="520" height="160" fill="#FFFFFF"/>

  <!-- Bande rouge verticale gauche (signature L'Équipe) -->
  <rect x="0" y="0" width="12" height="160" fill="#E8001D"/>

  <!-- ── ICON BLOCK — carré rouge avec P stylisé ── -->
  <g transform="translate(28, 16)">
    <!-- Bloc rouge carré — style L'Équipe encart couleur -->
    <rect width="92" height="92" fill="#E8001D"/>

    <!-- Barres montantes blanches — data viz minimaliste -->
    <rect x="12" y="62" width="11" height="18" fill="#FFFFFF" opacity="0.4"/>
    <rect x="27" y="50" width="11" height="30" fill="#FFFFFF" opacity="0.6"/>
    <rect x="42" y="34" width="11" height="46" fill="#FFFFFF" opacity="0.8"/>
    <rect x="57" y="18" width="11" height="62" fill="#FFFFFF"/>

    <!-- Ligne tendance + flèche blanche -->
    <polyline points="17,59 32,47 47,31 62,15" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="square"/>
    <!-- Arrow head carré style -->
    <polygon points="62,15 54,20 67,24" fill="#FFFFFF"/>

    <!-- Score badge noir en bas à droite -->
    <rect x="56" y="72" width="36" height="20" fill="#111111"/>
    <text x="74" y="86" font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif" font-weight="700" font-size="13" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">+EV</text>
  </g>

  <!-- ── WORDMARK BLOC ── -->
  <!-- PARI — rouge, ultra bold condensed -->
  <text
    x="136" y="88"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-weight="900"
    font-size="78"
    letter-spacing="-2"
    fill="#E8001D">PARI</text>

  <!-- SCORE — noir, même typo -->
  <text
    x="136" y="88"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-weight="900"
    font-size="78"
    letter-spacing="-2"
    fill="#111111"
    transform="translate(222, 0)">SCORE</text>

  <!-- Séparateur | vertical noir entre PARI et SCORE -->
  <rect x="220" y="20" width="4" height="70" fill="#E8001D"/>

  <!-- ── TAGLINE — style bandeau journal ── -->
  <!-- Bandeau noir sous le wordmark -->
  <rect x="136" y="104" width="370" height="26" fill="#111111"/>
  <text
    x="321"
    y="121"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-weight="700"
    font-size="13"
    letter-spacing="3.5"
    fill="#FFFFFF"
    text-anchor="middle">ANALYSE  ·  DONNÉES  ·  EDGE</text>

  <!-- Trait rouge fin sous tagline -->
  <rect x="136" y="130" width="370" height="3" fill="#E8001D"/>

  <!-- ── DOMAINE — coin bas droit ── -->
  <text
    x="506" y="150"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-size="10"
    font-weight="700"
    fill="#999999"
    text-anchor="end"
    letter-spacing="1">PARISCORE.FR</text>
</svg>
