name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train model
        run: python run.py train
      - name: Run tests
        run: pip install pytest pytest-asyncio httpx && pytest tests/ -v --ignore=tests/test_models.py
      - name: API smoke test
        run: |
          python -m uvicorn src.api.main:app &
          sleep 3
          curl -f http://localhost:8000/health
          kill %1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
