name: Load Test

# Task ID: CICD-1
# Runs k6 load tests against the production standalone build.
#
# Only triggers on pull_request (load tests are slow — skipping on every push
# keeps CI fast). Only the `smoke` and `api_load` scenarios run in CI; the
# heavier `elo_stress` and `mixed` scenarios are reserved for local/manual runs.
#
# k6 threshold failures are informational in CI (the app runs in a degraded
# dev-like mode and the thresholds in tests/load/script.js are tuned for prod),
# so they do NOT fail this workflow — logs are uploaded for review instead.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load-test:
    name: k6 (smoke + api_load)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NODE_ENV: production
      NEXT_PUBLIC_POSTHOG_KEY: ""
      # ODDS_API_KEY intentionally unset → mock fixtures.
      PORT: "3000"
      HOSTNAME: "127.0.0.1"
      BASE_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install k6 (official GitHub binary, linux-amd64)
        # Downloads the latest k6 release tarball from GitHub and installs
        # the prebuilt binary into /usr/local/bin.
        #
        # Asset URL pattern:
        #   https://github.com/grafana/k6/releases/download/<tag>/k6-<tag>-linux-amd64.tar.gz
        #
        # We resolve <tag> dynamically via the GitHub API so the workflow
        # always tracks the latest release. Pin K6_VERSION below to a fixed
        # tag (e.g. "v0.56.0") if you need reproducible CI.
        run: |
          set -euo pipefail
          K6_VERSION=$(curl -fsSL https://api.github.com/repos/grafana/k6/releases/latest \
            | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Resolved latest k6 version: ${K6_VERSION}"
          TARBALL="https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz"
          echo "Downloading: ${TARBALL}"
          mkdir -p /tmp/k6-install
          curl -fsSL "${TARBALL}" | tar xz -C /tmp/k6-install
          sudo install "/tmp/k6-install/k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      - name: Build standalone production bundle
        run: bun run build

      - name: Start production server
        run: |
          node .next/standalone/server.js > server.log 2>&1 &
          echo $! > server.pid
          echo "Server PID: $(cat server.pid)"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
            if [ "$code" = "200" ]; then
              echo "Server ready after ${i}s (HTTP 200)."
              exit 0
            fi
            echo "  attempt ${i}/60 → HTTP ${code}, waiting 1s…"
            sleep 1
          done
          echo "::error::Server did not become ready within 60s."
          echo "----- server.log -----"
          cat server.log || true
          exit 1

      - name: Run k6 smoke scenario
        # 10 VUs, 1 iteration each — sanity check. Threshold failures are
        # informational here (app is in degraded mode), so we do NOT fail.
        run: |
          mkdir -p k6-logs
          K6_SCENARIO=smoke k6 run tests/load/script.js 2>&1 | tee k6-logs/smoke.log || \
            echo "k6 smoke exited non-zero (threshold failures are informational in CI)"

      - name: Run k6 api_load scenario
        # 50 VUs for 60s against the cached /api/tennis/prematch endpoint.
        run: |
          K6_SCENARIO=api_load k6 run tests/load/script.js 2>&1 | tee k6-logs/api_load.log || \
            echo "k6 api_load exited non-zero (threshold failures are informational in CI)"

      - name: Upload k6 logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-logs
          path: k6-logs/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-server-log
          path: server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Kill production server
        if: always()
        run: |
          if [ -f server.pid ]; then
            PID=$(cat server.pid)
            kill "$PID" 2>/dev/null || true
            sleep 1
            kill -9 "$PID" 2>/dev/null || true
          fi
