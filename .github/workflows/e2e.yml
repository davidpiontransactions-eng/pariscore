name: E2E

# Task ID: CICD-1
# Builds the standalone production bundle and runs the Playwright E2E suite
# (51 specs in tests/) against the production server (NOT the dev server —
# dev server is too slow for CI).
#
# Runs in degraded mode: NEXT_PUBLIC_POSTHOG_KEY is empty and ODDS_API_KEY is
# unset, so the app uses mock data and disables analytics.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Env shared by build + server: degraded mode (mock data, no analytics).
    env:
      NODE_ENV: production
      NEXT_PUBLIC_POSTHOG_KEY: ""
      # ODDS_API_KEY intentionally unset → app falls back to mock fixtures.
      PORT: "3000"
      HOSTNAME: "127.0.0.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        # --with-deps installs OS libraries chromium needs (libnss3, etc.)
        run: bunx playwright install --with-deps chromium

      - name: Build standalone production bundle
        # `bun run build` = next build + copy .next/static + public into
        # .next/standalone (see package.json). NEXT_PUBLIC_POSTHOG_KEY is
        # inlined at build time, so it must be empty here.
        run: bun run build

      - name: Start production server
        # Launch the standalone Node server in the background and persist
        # its PID so we can kill it in the cleanup step.
        run: |
          node .next/standalone/server.js > server.log 2>&1 &
          echo $! > server.pid
          echo "Server PID: $(cat server.pid)"

      - name: Wait for server to be ready
        # Poll the homepage until it returns HTTP 200, max 60s.
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
            if [ "$code" = "200" ]; then
              echo "Server ready after ${i}s (HTTP 200)."
              exit 0
            fi
            echo "  attempt ${i}/60 → HTTP ${code}, waiting 1s…"
            sleep 1
          done
          echo "::error::Server did not become ready within 60s."
          echo "----- server.log -----"
          cat server.log || true
          exit 1

      - name: Run Playwright E2E tests
        # Use both `list` (live CI console) and `html` (artifact on failure)
        # reporters. The config already defines both, but being explicit here
        # guarantees the HTML report is generated for upload.
        env:
          CI: "true"
        run: bunx playwright test --reporter=list --reporter=html

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Kill production server
        if: always()
        run: |
          if [ -f server.pid ]; then
            PID=$(cat server.pid)
            kill "$PID" 2>/dev/null || true
            sleep 1
            kill -9 "$PID" 2>/dev/null || true
          fi
