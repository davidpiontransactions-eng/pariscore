name: Build

# Task ID: CICD-1
# Verifies the standalone production build (`next build` with output: "standalone")
# succeeds. Caches .next/cache between runs for faster rebuilds.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Next.js standalone build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Degraded mode — empty PostHog key + no ODDS_API_KEY so the build
      # does not attempt to fetch live odds during static generation.
      NEXT_PUBLIC_POSTHOG_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Bust when the lockfile or any source changes; fall back to the
          # most recent OS-level cache for partial hits.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx', '*.[jt]s', '*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build standalone bundle
        # `bun run build` = next build && cp -r .next/static .next/standalone/.next/ && cp -r public .next/standalone/
        # (see package.json). Verifies the standalone server.js is produced.
        run: bun run build

      - name: Verify standalone server exists
        run: |
          if [ ! -f ".next/standalone/server.js" ]; then
            echo "::error::.next/standalone/server.js was not produced — standalone build failed."
            exit 1
          fi
          echo "✓ Standalone server.js present: $(du -h .next/standalone/server.js | cut -f1)"

      - name: Upload standalone bundle (on failure, for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: standalone-build-failed
          path: |
            .next/
            !.next/cache
          if-no-files-found: warn
          retention-days: 3
