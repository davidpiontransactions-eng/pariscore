<!doctype html><html><head><meta charset="utf-8"></head>
<body><pre id="out">test JS…</pre>
<script>
document.getElementById('out').textContent = 'JS fonctionne. Test fetch...';
fetch('/api/v1/pariscore-v2-hybrid.html').then(r=>r.text()).then(t=>{
