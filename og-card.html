<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>PariScore OG Card 1200x630</title>
<style>
  html,body{margin:0;padding:0}
  /* Exporter cette boîte en PNG 1200x630 → og-image.png */
  .og{
    width:1200px;height:630px;box-sizing:border-box;
    background:radial-gradient(circle at 20% 20%,#13301f 0%,#0a0d0f 55%);
    color:#e8eaed;font-family:'Segoe UI',system-ui,sans-serif;
    display:flex;flex-direction:column;justify-content:center;
    padding:80px;position:relative;overflow:hidden;
  }
  .og::after{content:"";position:absolute;right:-120px;top:-120px;width:520px;height:520px;
    border-radius:50%;background:radial-gradient(circle,#00e67633,transparent 70%)}
  .logo{font-size:40px;font-weight:800;letter-spacing:-1px;color:#00e676;margin-bottom:28px}
  h1{font-size:72px;line-height:1.05;margin:0 0 24px;font-weight:800}
  h1 span{color:#00e676}
  p{font-size:30px;color:#8d9399;margin:0;max-width:900px}
  .tags{margin-top:44px;display:flex;gap:16px}
  .tag{background:#181c20;border:1px solid #1e2328;border-radius:999px;
    padding:12px 24px;font-size:22px;color:#29b6f6}
</style>
</head>
<body>
<div class="og">
  <div class="logo">PariScore</div>
  <h1>Pariez avec les <span>données</span>,<br>pas l'instinct.</h1>
  <p>Pronostics football &amp; tennis par algorithme : Power Score, xG, value bets dévigés.</p>
  <div class="tags">
    <div class="tag">Power Score</div>
    <div class="tag">Expected Goals</div>
    <div class="tag">Value Bet</div>
  </div>
</div>
</body>
</html>
