<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="t2 d2">
  <title id="t2">PariScore Roland Garros 2026 — Circular Emblem</title>
  <desc id="d2">Concentric clay-orange and emerald rings with central tennis ball, "PariScore" arched above and "ROLAND GARROS" below.</desc>

  <defs>
    <radialGradient id="bgGrad2" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1f24"/>
      <stop offset="60%" stop-color="#0a0d0f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="emeraldRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c8a5a"/>
      <stop offset="100%" stop-color="#0a3a22"/>
    </linearGradient>

    <radialGradient id="claycenter" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#e88f57"/>
      <stop offset="70%" stop-color="#cc6633"/>
      <stop offset="100%" stop-color="#8a3a1a"/>
    </radialGradient>

    <radialGradient id="ballGrad2" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#e8f06a"/>
      <stop offset="60%" stop-color="#c2d445"/>
      <stop offset="100%" stop-color="#8aa325"/>
    </radialGradient>

    <linearGradient id="goldArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f4d97a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>

    <!-- Curved paths for text-on-path -->
    <path id="arcTop" d="M 96 256 A 160 160 0 0 1 416 256" fill="none"/>
    <path id="arcBottom" d="M 96 256 A 160 160 0 0 0 416 256" fill="none"/>

    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bgGrad2)"/>

  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="url(#goldArc)" stroke-width="2.5" opacity="0.85"/>

  <!-- Emerald outer band -->
  <circle cx="256" cy="256" r="210" fill="url(#emeraldRing)" filter="url(#shadow2)"/>

  <!-- Gold separator ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#goldArc)" stroke-width="1.8" opacity="0.9"/>

  <!-- Clay center disc -->
  <circle cx="256" cy="256" r="165" fill="url(#claycenter)"/>

  <!-- Inner emerald border -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#0f5132" stroke-width="3" opacity="0.6"/>

  <!-- Clay granular texture -->
  <g opacity="0.3" fill="#8a3a1a">
    <circle cx="180" cy="180" r="1.5"/>
    <circle cx="210" cy="220" r="1"/>
    <circle cx="250" cy="195" r="1.3"/>
    <circle cx="290" cy="210" r="1.1"/>
    <circle cx="320" cy="240" r="1.5"/>
    <circle cx="200" cy="270" r="1"/>
    <circle cx="240" cy="290" r="1.3"/>
    <circle cx="280" cy="280" r="1.1"/>
    <circle cx="320" cy="300" r="1"/>
    <circle cx="190" cy="320" r="1.3"/>
    <circle cx="230" cy="335" r="1"/>
    <circle cx="280" cy="320" r="1.5"/>
    <circle cx="310" cy="345" r="1.1"/>
  </g>

  <!-- Central tennis ball -->
  <g transform="translate(256, 256)" filter="url(#shadow2)">
    <circle r="72" fill="url(#ballGrad2)"/>
    <path d="M -65 -20 Q 0 -72 65 -20" fill="none" stroke="#ffffff" stroke-width="3.2" opacity="0.9"/>
    <path d="M -65 20 Q 0 72 65 20" fill="none" stroke="#ffffff" stroke-width="3.2" opacity="0.9"/>
    <ellipse cx="-26" cy="-30" rx="20" ry="14" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- Top arched text "PariScore" -->
  <text font-family="Georgia, 'Bree Serif', serif" font-size="38" font-weight="700"
        fill="#f4d97a" letter-spacing="6">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">PARISCORE</textPath>
  </text>

  <!-- Bottom arched text "ROLAND GARROS · 2026" -->
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600"
        fill="#fff8e7" letter-spacing="8">
    <textPath href="#arcBottom" startOffset="50%" text-anchor="middle">ROLAND GARROS · 2026</textPath>
  </text>

  <!-- Side stars / accents -->
  <g fill="#f4d97a" opacity="0.9">
    <polygon points="60,256 70,250 80,256 70,262" />
    <polygon points="432,256 442,250 452,256 442,262" />
  </g>
</svg>
