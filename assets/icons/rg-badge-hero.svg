<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-labelledby="rgh-t rgh-d">
  <title id="rgh-t">PariScore × Roland Garros 2026</title>
  <desc id="rgh-d">Badge médaillon PariScore Roland Garros — anneau or, terre battue clay, centre cream avec PS monogram et tagline.</desc>

  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fae8a0"/>
      <stop offset="50%" stop-color="#f4d97a"/>
      <stop offset="100%" stop-color="#a07a1f"/>
    </linearGradient>
    <radialGradient id="clay" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#e88f57"/>
      <stop offset="70%" stop-color="#cc6633"/>
      <stop offset="100%" stop-color="#5a2010"/>
    </radialGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c8a5a"/>
      <stop offset="100%" stop-color="#0a3a22"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#f0fa8a"/>
      <stop offset="55%" stop-color="#c2d445"/>
      <stop offset="100%" stop-color="#6b7a1c"/>
    </radialGradient>
    <radialGradient id="cream" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="100%" stop-color="#f0e4c4"/>
    </radialGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="95" fill="url(#gold)" filter="url(#dropShadow)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#7a5510" stroke-width="0.8"/>

  <!-- Middle clay terracotta ring -->
  <circle cx="100" cy="100" r="86" fill="url(#clay)"/>

  <!-- Gold inner separator -->
  <circle cx="100" cy="100" r="74" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.9"/>

  <!-- Clay granular texture -->
  <g opacity="0.3" fill="#5a2010">
    <circle cx="60" cy="60" r="1.2"/>
    <circle cx="140" cy="65" r="1"/>
    <circle cx="55" cy="135" r="1.3"/>
    <circle cx="145" cy="140" r="1.1"/>
    <circle cx="75" cy="170" r="1"/>
    <circle cx="125" cy="170" r="1.2"/>
    <circle cx="35" cy="100" r="1"/>
    <circle cx="165" cy="100" r="1.3"/>
  </g>

  <!-- Inner cream paper disc -->
  <circle cx="100" cy="100" r="62" fill="url(#cream)"/>

  <!-- Inner emerald hairline -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="#0f5132" stroke-width="1.2" opacity="0.6"/>

  <!-- Top tennis ball accent -->
  <g transform="translate(100, 50)" filter="url(#dropShadow)">
    <circle r="12" fill="url(#ball)"/>
    <path d="M -10 -3 Q 0 -11 10 -3" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.9"/>
    <path d="M -10 3 Q 0 11 10 3" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.9"/>
    <ellipse cx="-4" cy="-5" rx="3" ry="2" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Big monogram "PS" centered -->
  <text x="100" y="118" text-anchor="middle"
        font-family="Georgia, 'Bree Serif', serif"
        font-size="50" font-weight="700"
        fill="url(#emerald)"
        letter-spacing="-2">PS</text>

  <!-- Tagline "ROLAND GARROS" arched bottom -->
  <text x="100" y="148" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="700"
        fill="#0f5132"
        letter-spacing="3">ROLAND GARROS</text>

  <!-- Year -->
  <text x="100" y="162" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="8" font-weight="500"
        fill="#cc6633"
        letter-spacing="4">2026 · BRACKET</text>

  <!-- Bottom gold ornament dots -->
  <circle cx="78" cy="172" r="1.5" fill="url(#gold)"/>
  <circle cx="100" cy="174" r="1.8" fill="url(#gold)"/>
  <circle cx="122" cy="172" r="1.5" fill="url(#gold)"/>
</svg>
