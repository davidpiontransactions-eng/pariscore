name: pariscore_mobile
description: PariScore — Sports Statistics & Betting Analysis

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Network
  dio: ^5.7.0

  # Dependency injection
  get_it: ^8.0.2
  injectable: ^2.4.4

  # Storage
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # Functional programming (Either/Option)
  dartz: ^0.10.1

  # Utils
  intl: ^0.19.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

