# ════════════════════════════════════════════════════════════════════
# NGINX HARDENING — PariScore (post-incident 20 mai 2026)
# Bd: ParisScorebis-c8m / phase Hardening
# ════════════════════════════════════════════════════════════════════
# Usage: snippet a inclure dans /etc/nginx/sites-available/pariscore.fr
# BEFORE le location / { proxy_pass http://localhost:3000; } principal.
#
# Double-layer protection: nginx bloque AVANT que Node.js voit la requete.
# Si Node.js a un bug ou un fichier oublié dans BLOCKED_FILES, nginx prend
# le relais.
# ════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    server_name pariscore.fr www.pariscore.fr;

    # ... [tes blocks SSL existants ici] ...

    # ────────────────────────────────────────────────────────────────
    # SECURITY HARDENING — bloque acces fichiers sensibles AVANT proxy
    # ────────────────────────────────────────────────────────────────

    # 1. Fichiers source code Node.js
    location ~ ^/(server\.js|seed_historique_db\.js|fix-matches\.js|test-integrity\.js)$ {
        deny all;
        access_log /var/log/nginx/pariscore-blocked.log;
        return 403;
    }

    # 2. Config / secrets
    location ~ \.(env|env\.local|env\.example)$ {
        deny all;
        access_log /var/log/nginx/pariscore-blocked.log;
        return 403;
    }
    location ~ ^/\.env { deny all; return 403; }
    location ~ /\.(env|git|github|claude|beads|planning|context)(/.*)?$ {
        deny all;
        return 403;
    }

    # 3. Base de données SQLite
    location ~ \.(db|db-wal|db-shm|sqlite|sqlite3)$ {
        deny all;
        access_log /var/log/nginx/pariscore-blocked.log;
        return 403;
    }

    # 4. JSON sensibles (database, history, ai_cache)
    location ~ ^/(database|history|ai_cache|leagues_config|bsd_config|flags_config)\.json$ {
        deny all;
        return 403;
    }

    # 5. Package + deploy metadata
    location ~ ^/(package(-lock)?\.json|render\.yaml|\.gitignore)$ {
        deny all;
        return 403;
    }

    # 6. Documentation interne
    location ~ ^/(CLAUDE|CHANGELOG|AUDIT|README)\.md$ {
        deny all;
        return 403;
    }

    # 7. Rapports + audits
    location ~ ^/rapport_.*\.(md|txt)$ {
        deny all;
        return 403;
    }

    # 8. Dotfiles génériques
    location ~ /\. {
        deny all;
        return 403;
    }

    # 9. IP bans post-incident (UFW redondant mais nginx layer)
    # Décommenter après confirmation incident:
    # deny 37.65.65.25;      # Attaquant Nantes FR SFR (breach 20/05)
    # deny 78.153.140.0/24;  # Scanner bot UK VPS
    # deny 185.213.174.0/24; # Scanner masse
    # deny 185.177.72.0/24;  # Scanner masse
    # deny 45.148.10.0/24;   # Scanner masse
    # deny 64.89.163.0/24;   # Scanner masse

    # ────────────────────────────────────────────────────────────────
    # RATE LIMITING — anti-bruteforce + DDoS protection
    # ────────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=scan_limit:10m rate=2r/s;

    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://localhost:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://localhost:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ────────────────────────────────────────────────────────────────
    # SECURITY HEADERS
    # ────────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP strict pour PariScore (a tester avant deploy)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://api.the-odds-api.com https://v3.football.api-sports.io https://generativelanguage.googleapis.com; font-src 'self' https://fonts.gstatic.com;" always;

    # ────────────────────────────────────────────────────────────────
    # PROXY PRINCIPAL vers Node.js (PariScore)
    # ────────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # SSE long-poll
        proxy_buffering off;
        proxy_read_timeout 86400;
    }
}

# ════════════════════════════════════════════════════════════════════
# DEPLOY:
#   1. sudo nano /etc/nginx/sites-available/pariscore.fr
#   2. Inject the location blocks above BEFORE 'location / { ... }'
#   3. Test config: sudo nginx -t
#   4. Reload: sudo systemctl reload nginx
#
# VERIFY:
#   curl -I https://pariscore.fr/server.js               # → 403
#   curl -I https://pariscore.fr/.env                    # → 403
#   curl -I https://pariscore.fr/database.json           # → 403
#   curl -I https://pariscore.fr/rapport_qa_foot_tennis.md # → 403
#   curl -I https://pariscore.fr/CLAUDE.md               # → 403
#   curl -I https://pariscore.fr/api/v1/status           # → 200 (proxy OK)
#
# LOGS:
#   tail -f /var/log/nginx/pariscore-blocked.log   # surveille tentatives
# ════════════════════════════════════════════════════════════════════
